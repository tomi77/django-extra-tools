name: Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ${{ matrix.runs-on }}

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.7"
            django-version: "Django>=1.11,<2.0"
            runs-on: ubuntu-22.04
          - python-version: "3.8"
            django-version: "Django>=2.2,<3.0"
            runs-on: ubuntu-latest
          - python-version: "3.10"
            django-version: "Django>=3.2,<4.0"
            runs-on: ubuntu-latest
          - python-version: "3.11"
            django-version: "Django>=4.2,<5.0"
            runs-on: ubuntu-latest

    env:
      DATABASE_NAME: test_db
      DATABASE_USER: test_user
      DATABASE_PASSWORD: test_pass
      DATABASE_HOST: 127.0.0.1
      DATABASE_PORT: 5432
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install "${{ matrix.django-version }}" psycopg2-binary pyyaml coverage

      - name: Run migrations
        run: python manage.py migrate

      - name: Run tests
        run: coverage run manage.py test tests
